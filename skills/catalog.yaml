    human_review_required: true
    prohibited_inputs:
      - confidential-data-in-unapproved-ai-tools
      - material-nonpublic-information-handled-improperly
      - live-credentials
    prohibited_actions:
      - execute-transactions
      - approve-investments
      - send-communications-automatically
      - provide-legal-advice
      - provide-tax-advice
      - provide-investment-advice
      - make-fiduciary-determinations
      - access-live-systems
      - rely-on-confidential-data-in-unapproved-ai-tools
    advice_boundary: >-
