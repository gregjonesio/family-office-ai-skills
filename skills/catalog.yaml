# Family Office AI Skills — Catalog
#
# Machine-readable inventory of the skills in this repository.
# This file is documentation and optional structure. It is NOT executable and
# enforces nothing. It is intended to help operators and AI builders discover,
# compare, and govern skills.
#
# Metadata is deliberately conservative. All skills are read-only,
# human-in-the-loop, and judgment-support only. None grant tool permissions or
# transaction authority. Entries are validated (by hand) against
# schemas/skill-manifest.schema.json.
#
# See CLAUDE.md and docs/skill-design-principles.md before adding a skill.

version: 0.1.0
catalog_disclaimer: >-
  These skills support human judgment and produce unverified drafts for review.
  They do not provide investment, legal, tax, accounting, compliance, or
  fiduciary advice, and they do not authorize any decision, transaction, or
  communication. Human review is required for every output. Risk levels describe
  the sensitivity of the domain, not a measure of safety.

skills:
  - id: principal-weekly-brief
    display_name: Principal Weekly Brief
    category: executive-decision-support
    description: >-
      Consolidates calendar items, open decisions, investment updates,
      operational issues, travel notes, and pending follow-ups into a concise,
      decision-ready weekly briefing draft for a principal.
    intended_users:
      - chief-of-staff
      - executive-assistant
      - family-office-operator
    input_types:
      - calendar-items
      - open-decisions
      - investment-updates
      - operational-notes
      - travel-notes
      - follow-ups
    output_types:
      - structured-briefing
    risk_level: medium
    tool_permissions: none
    human_review_required: true
    prohibited_inputs:
      - confidential-data-in-unapproved-ai-tools
      - live-credentials
      - account-numbers-or-identifiers-not-required-by-the-task
    prohibited_actions:
      - execute-transactions
      - approve-investments
      - send-communications-automatically
      - provide-legal-advice
      - provide-tax-advice
      - provide-investment-advice
      - make-fiduciary-determinations
      - access-live-systems
      - rely-on-confidential-data-in-unapproved-ai-tools
    advice_boundary: >-
      Summarizes investment and operational items for review only. Makes no
      recommendation and provides no professional advice.
    example_use_case: >-
      A chief of staff drafts the weekly principal brief in a consistent format
      for human review.
    path: skills/principal-weekly-brief/

